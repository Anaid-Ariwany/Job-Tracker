<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job-Tracker</title>

    <!-- favicon -->
    <link rel="icon" href="assets/images/favicon.webp" type="image/webp">

    <!-- seo meta tags -->
    <meta name="description"
        content="A job tracking application to help you keep track of your job applications and interviews.">
    <meta name="keywords" content="job tracking, job applications, interviews, job search, career management">
    <meta name="author" content="Anaid Ariwany">
    <meta name="robots" content="index, follow">

    <!-- open graph meta tags -->
    <meta property="og:title" content="Job-Tracker">
    <meta property="og:description"
        content="A job tracking application to help you keep track of your job applications and interviews.">
    <meta property="og:image" content="https://anaid-ariwany.github.io/Job-Tracker/assets/images/websiteReview.webp">
    <meta property="og:url" content="https://anaid-ariwany.github.io/Job-Tracker/">
    <meta property="og:type" content="website">

    <!-- poppins google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- inter google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,600&display=swap" rel="stylesheet">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div>
                <img src="assets/images/logo.webp" alt="Job-Tracker Logo" class="logo">
                <div>
                    <button>Dashboard</button>
                    <button>Help</button>
                    <button type="button" class="addButton">Add Job</button>
                </div>
            </div>
        </nav>
    </header>

    <main>

        <!-- joblist section -->
        <section>
            <h2 class="inter-heading">My Job Applications</h2>
            <div class="jobListContainer"></div>
        </section>

        <!-- form in modal -->
        <div class="modal fade" id="jobModal" tabindex="-1" aria-labelledby="jobModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title inter-heading" id="jobModalLabel">Add Job</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="jobForm">
                            <div class="mb-3">
                                <label for="companyName" class="form-label inter-heading">Company Name</label>
                                <input type="text" class="form-control" id="companyName" required>
                            </div>
                            <div class="mb-3">
                                <label for="position" class="form-label inter-heading">Position</label>
                                <input type="text" class="form-control" id="position" required>
                            </div>
                            <div class="mb-3">
                                <label for="date" class="form-label inter-heading">Application Date</label>
                                <input type="date" class="form-control" id="date" required>
                            </div>

                            <fieldset class="mb-3">
                                <legend class="form-label inter-heading">Location</legend>

                                <div class="btn-group" role="group">
                                    <input type="radio" class="btn-check" name="location" id="remote" value="remote"
                                        autocomplete="off">
                                    <label class="btn btn-outline-primary" for="remote">Remote</label>

                                    <input type="radio" class="btn-check" name="location" id="hybrid" value="hybrid"
                                        autocomplete="off">
                                    <label class="btn btn-outline-success" for="hybrid">Hybrid</label>

                                    <input type="radio" class="btn-check" name="location" id="onsite" value="onsite"
                                        autocomplete="off">
                                    <label class="btn btn-outline-secondary" for="onsite">On-site</label>
                                </div>
                            </fieldset>

                            <fieldset class="mb-3">
                                <legend class="form-label inter-heading">Status</legend>

                                <div class="btn-group" role="group">
                                    <input type="radio" class="btn-check" name="status" id="applied" value="applied"
                                        autocomplete="off">
                                    <label class="btn btn-outline-primary" for="applied">Applied</label>

                                    <input type="radio" class="btn-check" name="status" id="interview" value="interview"
                                        autocomplete="off">
                                    <label class="btn btn-outline-success" for="interview">Interview</label>

                                    <input type="radio" class="btn-check" name="status" id="offer" value="offer"
                                        autocomplete="off">
                                    <label class="btn btn-outline-secondary" for="offer">Offer</label>

                                    <input type="radio" class="btn-check" name="status" id="rejected" value="rejected"
                                        autocomplete="off">
                                    <label class="btn btn-outline-danger" for="rejected">Rejected</label>
                                </div>
                            </fieldset>

                            <div class="mb-3">
                                <label for="notes" class="form-label inter-heading">Notes</label>
                                <textarea class="form-control" id="notes" rows="3"></textarea>
                            </div>

                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                                aria-label="Close">Cancel</button>
                            <button type="submit" id="submitButton" class="btn btn-primary">Add Job</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- confirm delete modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        Are you sure you want to delete this job application?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger" id="confirmDelete">Delete</button>
                    </div>
                </div>
            </div>
        </div>

    </main>



    <!-- js -->
    <script src="js/app.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
