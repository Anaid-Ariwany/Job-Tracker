<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job-Tracker</title>

    <!-- favicon -->
    <link rel="icon" href="assets/images/favicon.webp" type="image/webp">

    <!-- seo meta tags -->
    <meta name="description"
        content="A job tracking application to help you keep track of your job applications and interviews.">
    <meta name="keywords" content="job tracking, job applications, interviews, job search, career management">
    <meta name="author" content="Anaid Ariwany">
    <meta name="robots" content="index, follow">

    <!-- open graph meta tags -->
    <meta property="og:title" content="Job-Tracker">
    <meta property="og:description"
        content="A job tracking application to help you keep track of your job applications and interviews.">
    <meta property="og:image" content="https://anaid-ariwany.github.io/Job-Tracker/assets/images/websiteReview.webp">
    <meta property="og:url" content="https://anaid-ariwany.github.io/Job-Tracker/">
    <meta property="og:type" content="website">

    <!-- poppins google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- inter google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,600&display=swap" rel="stylesheet">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg fixed-top">
            <a class="navbar-brand" href="#"><img src="assets/images/logo.webp" alt="logo" class="logo"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
                </ul>
                <button class="addJob"><span class="badge"><img src="assets/icons/addIcon.webp" alt="add icon"
                            class="addIcon"></span>Add Job</button>
            </div>

        </nav>
    </header>

    <main>

        <!-- updates section -->
        <section class="updateSection">

            <!-- card -->
            <div class="card totalCard">
                <!-- top -->
                <h5 class="text-primary"><span class="badge"><img src="assets/icons/totalIcon.webp" alt="total icon"
                            class="icon"></span>Total
                </h5>

                <!-- bottom -->
                <h3>12</h3>
            </div>

            <!-- card -->
            <div class="card interviewCard">
                <!-- top -->
                <h5 class="text-warning"><span class="badge"><img src="assets/icons/interviewIcon.webp"
                            alt="interview icon" class="icon"></span>Interviews
                </h5>

                <!-- bottom -->
                <h3>3</h3>
            </div>

            <!-- card -->
            <div class="card offerCard">
                <!-- top -->
                <h5 class="text-success"><span class="badge"><img src="assets/icons/offerIcon.webp" alt="offers icon"
                            class="icon"></span>Offers</h5>

                <!-- bottom -->
                <h3>12</h3>
            </div>

            <!-- card -->
            <div class="card rejectionCard">
                <!-- top -->
                <h5 class="text-danger"><span class="badge"><img src="assets/icons/rejectedIcon.webp"
                            alt="rejections icon" class="icon"></span>Rejections
                </h5>

                <!-- bottom -->
                <h3>2</h3>
            </div>

        </section>


        <!-- filter section -->
        <section class="filterSection">

            <!-- filter by status -->
            <select class="form-select" aria-label="Filter by status">
                <option selected>Filter by Status</option>
                <option value="1">Applied</option>
                <option value="2">Interview</option>
                <option value="3">Offer</option>
                <option value="4">Rejected</option>
            </select>

            <!-- filter by job type -->
            <select class="form-select" aria-label="Filter by Job Type">
                <option selected>Filter by Job Type</option>
                <option value="1">Frontend</option>
                <option value="2">Backend</option>
                <option value="3">UI/UX</option>
                <option value="4">FullStack</option>
            </select>

            <!-- filter by search -->
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Search" aria-label="Search">

                <button class="input-group-text border-0 bg-transparent p-2" type="button" id="search-button">
                    <img src="assets/icons/searchIcon.webp" alt="search icon" class="icon">
                </button>
            </div>

        </section>

        <!-- job list section -->
        <section class="jobListSection"></section>

        <!-- form in a modal -->
        <div class="modal fade" id="jobModal" tabindex="-1" aria-labelledby="jobModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title inter-heading" id="jobModalLabel">Add Job</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <!-- form -->
                        <form id="jobForm" class="jobForm">
                            <div class="mb-3">
                                <label class="inter-heading" for="companyName" class="form-label">Company Name</label>
                                <input type="text" class="form-control" id="companyName"
                                    placeholder="Code Space Ventures" required>
                            </div>
                            <div class="mb-3">
                                <label class="inter-heading" for="position" class="form-label">Position</label>
                                <input type="text" class="form-control" id="position" placeholder="Frontend Developer"
                                    required>
                            </div>

                            <div class="mb-3">
                                <div>
                                    <label class="inter-heading" for="location" class="form-label">Location</label>
                                </div>
                                <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                                    <input type="radio" class="btn-check" name="btnradio" id="remote" value="Remote"
                                        autocomplete="off">
                                    <label class="btn btn-outline-primary" for="remote" value="Remote">Remote</label>

                                    <input type="radio" class="btn-check" name="btnradio" id="hybrid" value="Hybrid"
                                        autocomplete="off">
                                    <label class="btn btn-outline-primary" for="hybrid" value="Hybrid">Hybrid</label>

                                    <input type="radio" class="btn-check" name="btnradio" id="onsite" value="On-Site"
                                        autocomplete="off">
                                    <label class="btn btn-outline-primary" for="onsite" value="On-Site">On-Site</label>
                                </div>

                            </div>

                            <div class="mb-3">
                                <div>
                                    <label class="inter-heading" for="status" class="form-label">Status</label>
                                </div>
                                <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                                    <input type="radio" class="btn-check" name="statusRadio" id="applied"
                                        value="Applied" autocomplete="off">
                                    <label class="btn btn-outline-primary" for="applied" value="Applied">Applied</label>

                                    <input type="radio" class="btn-check" name="statusRadio" id="interview"
                                        value="Interview" autocomplete="off">
                                    <label class="btn btn-outline-primary" for="interview"
                                        value="Interview">Interview</label>

                                    <input type="radio" class="btn-check" name="statusRadio" id="offer" value="Offer"
                                        autocomplete="off">
                                    <label class="btn btn-outline-primary" for="offer" value="Offer">Offer</label>

                                    <input type="radio" class="btn-check" name="statusRadio" id="rejected"
                                        value="Rejected" autocomplete="off">
                                    <label class="btn btn-outline-primary" for="rejected"
                                        value="Rejected">Rejected</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="inter-heading" for="notes" class="form-label">Notes</label>
                                <textarea class="form-control" id="notes" rows="3"
                                    placeholder="Add any additional notes here..."></textarea>
                            </div>

                            <!-- buttons -->
                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary cancelButton" data-bs-dismiss="modal"
                                    aria-label="Close">Cancel</button>
                                <button type="submit" class="btn btn-primary submitButton">Add Job</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer>
        <img src="assets/images/logo.webp" alt="logo" class="logo">
        <p>&copy; 2026 Job-Tracker. All rights reserved.</p>
        <p>Made by <a href="https://github.com/Anaid-Ariwany" target="_blank" rel="noopener noreferrer">Anaid
                Ariwany</a></p>
    </footer>



    <!-- js -->
    <script src="js/app.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
